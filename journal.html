<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lulu's Recomp Journal</title>
<style>
  :root{
    --blush:#FBEFEA;
    --blush-deep:#F5DDD2;
    --card:#FFFBF8;
    --ink:#3D2B2E;
    --ink-soft:#8C6F6A;
    --rose:#C98A6B;
    --rose-deep:#B06A4F;
    --rose-pale:#F2DAD0;
    --burgundy:#9C4A4A;
    --gold:#C9A04E;
    --gold-soft:#E8D5A8;
    --line:#EBD9CE;
    --white:#FFFFFF;
    --blue:#7C9BC4;
    --blue-deep:#5C7FA6;
    --blue-pale:#DCE6F2;
    --shadow: 0 4px 20px rgba(157,90,76,0.10);
    --shadow-sm: 0 2px 10px rgba(157,90,76,0.08);
    --radius: 20px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 10% 0%, rgba(201,138,107,0.08), transparent 40%),
      radial-gradient(circle at 90% 10%, rgba(212,168,87,0.07), transparent 35%),
      var(--blush);
    color:var(--ink);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .app{
    max-width:760px;
    margin:0 auto;
    padding:28px 18px 80px;
  }
  ::selection{background:var(--rose-pale);}

  /* ===== Header ===== */
  .header{
    text-align:center;
    margin-bottom:20px;
    position:relative;
  }
  .crown-mark{
    font-size:22px;
    margin-bottom:4px;
    opacity:0.85;
  }
  .header h1{
    font-family:Georgia,'Playfair Display',serif;
    font-size:32px;
    font-weight:700;
    margin:0 0 4px;
    letter-spacing:0.01em;
    color:var(--ink);
  }
  .header h1 .accent{
    color:var(--rose-deep);
    font-style:italic;
  }
  .header p{
    margin:0;
    color:var(--ink-soft);
    font-size:13px;
    letter-spacing:0.03em;
    text-transform:uppercase;
    font-weight:600;
  }
  .date-today{
    text-align:center;
    color:var(--ink-soft);
    font-size:13px;
    margin-bottom:20px;
    font-weight:600;
  }

  /* ===== Tabs ===== */
  .tabs{
    display:flex;
    background:var(--card);
    border-radius:100px;
    padding:5px;
    margin-bottom:20px;
    box-shadow:var(--shadow-sm);
    border:1px solid var(--line);
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
  }
  .tabs::-webkit-scrollbar{display:none;}
  .tab{
    flex:1 0 auto;
    min-width:64px;
    text-align:center;
    padding:10px 6px;
    border-radius:100px;
    font-size:12px;
    font-weight:700;
    color:var(--ink-soft);
    cursor:pointer;
    transition:all .2s ease;
    white-space:nowrap;
  }
  .tab.active{
    background:linear-gradient(135deg,var(--rose),var(--rose-deep));
    color:white;
    box-shadow:0 3px 10px rgba(176,106,79,0.3);
  }

  /* ===== Banner stats ===== */
  .banner{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
    margin-bottom:20px;
  }
  .stat-card{
    background:var(--card);
    border-radius:var(--radius);
    padding:16px 12px;
    box-shadow:var(--shadow-sm);
    text-align:center;
    border:1px solid var(--line);
    position:relative;
  }
  .stat-card .num{
    font-family:Georgia,serif;
    font-size:26px;
    font-weight:700;
    line-height:1;
    margin-bottom:4px;
  }
  .stat-card .lbl{
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--ink-soft);
    font-weight:700;
  }
  .stat-card.streak .num{color:var(--burgundy);}
  .stat-card.score .num{color:var(--rose-deep);}
  .stat-card.badges .num{color:var(--gold);}

  /* ===== Card ===== */
  .card{
    background:var(--card);
    border-radius:var(--radius);
    padding:20px;
    margin-bottom:16px;
    box-shadow:var(--shadow);
    border:1px solid var(--line);
  }
  .card h2{
    font-family:Georgia,serif;
    font-size:17px;
    margin:0 0 14px;
    display:flex;
    align-items:center;
    gap:8px;
    color:var(--ink);
  }
  .card h2 .icon{font-size:17px;}
  .card-sub{
    font-size:12px;
    color:var(--ink-soft);
    margin:-10px 0 14px;
  }

  /* ===== Activity logging ===== */
  .train-options{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    margin-bottom:12px;
  }
  .train-btn{
    background:var(--blush-deep);
    border:2px solid transparent;
    border-radius:14px;
    padding:12px 8px;
    text-align:center;
    cursor:pointer;
    font-size:12.5px;
    font-weight:700;
    color:var(--ink-soft);
    transition:all .15s ease;
  }
  .train-btn .emoji{display:block;font-size:19px;margin-bottom:4px;}
  .train-btn:hover{border-color:var(--rose);}
  .train-btn.active{
    background:linear-gradient(135deg,var(--rose-pale),var(--blush-deep));
    border-color:var(--rose);
    color:var(--rose-deep);
  }
  .train-note{
    width:100%;
    border:1px solid var(--line);
    border-radius:12px;
    padding:10px 12px;
    font-family:inherit;
    font-size:13px;
    resize:none;
    background:var(--blush);
    color:var(--ink);
    margin-bottom:10px;
  }
  .train-note:focus{outline:2px solid var(--rose);outline-offset:1px;}

  .btn{
    border:none;
    border-radius:100px;
    padding:11px 18px;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
    font-family:inherit;
    transition:all .15s ease;
  }
  .btn-primary{
    background:linear-gradient(135deg,var(--rose),var(--rose-deep));
    color:white;
    box-shadow:0 3px 10px rgba(176,106,79,0.25);
  }
  .btn-primary:hover{filter:brightness(1.05);}
  .btn-primary:active{transform:scale(0.98);}
  .btn-block{width:100%;padding:14px;font-size:14px;}
  .btn-ghost{
    background:var(--blush-deep);
    color:var(--ink-soft);
  }
  .btn-ghost:hover{background:var(--rose-pale);color:var(--rose-deep);}
  .btn-text{
    background:none;
    color:var(--rose-deep);
    text-decoration:underline;
    padding:6px 0;
    font-size:12px;
  }
  .btn-danger-text{
    background:none;
    color:#A85454;
    padding:4px 8px;
    font-size:12px;
    text-decoration:underline;
  }

  /* ===== Logged activity list (today) ===== */
  .activity-list{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-bottom:14px;
  }
  .activity-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--blush);
    border-radius:12px;
    padding:10px 12px;
    border:1px solid var(--line);
  }
  .ai-left{display:flex;align-items:center;gap:10px;}
  .ai-emoji{font-size:18px;}
  .ai-label{font-weight:700;font-size:13px;}
  .ai-note{font-size:11px;color:var(--ink-soft);}
  .ai-actions{display:flex;gap:4px;}
  .icon-btn{
    background:none;
    border:none;
    cursor:pointer;
    font-size:14px;
    padding:4px 6px;
    border-radius:8px;
    color:var(--ink-soft);
  }
  .icon-btn:hover{background:var(--rose-pale);}

  /* ===== Steps ===== */
  .steps-row{display:flex;align-items:center;gap:14px;}
  .steps-input-wrap{flex:1;}
  input[type="number"], input[type="text"], input[type="date"]{font-family:inherit;}
  .steps-input{
    width:100%;
    font-size:24px;
    font-weight:700;
    font-family:Georgia,serif;
    border:none;
    border-bottom:2px solid var(--line);
    background:transparent;
    padding:6px 2px;
    color:var(--ink);
  }
  .steps-input:focus{outline:none;border-color:var(--rose);}
  .steps-goal-bar{
    height:8px;
    background:var(--blush-deep);
    border-radius:100px;
    overflow:hidden;
    margin-top:10px;
  }
  .steps-goal-fill{
    height:100%;
    background:linear-gradient(90deg,var(--rose),var(--gold));
    border-radius:100px;
    transition:width .4s ease;
  }
  .steps-meta{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    color:var(--ink-soft);
    margin-top:6px;
  }
  .quick-steps{display:flex;gap:6px;flex-wrap:wrap;}
  .chip{
    background:var(--blush-deep);
    border:none;
    border-radius:100px;
    padding:6px 12px;
    font-size:12px;
    font-weight:700;
    color:var(--ink-soft);
    cursor:pointer;
  }
  .chip:hover{background:var(--rose-pale);color:var(--rose-deep);}

  /* ===== Macros ===== */
  .macro-targets{
    display:flex;
    gap:6px;
    margin-bottom:16px;
    font-size:11.5px;
    color:var(--ink-soft);
    flex-wrap:wrap;
  }
  .macro-targets b{color:var(--ink);}
  .meal-add-row{
    display:grid;
    grid-template-columns:1.35fr repeat(4,.78fr);
    gap:8px;
    margin-bottom:10px;
  }
  .meal-add-row input{
    width:100%;
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px;
    font-size:13px;
    background:var(--blush);
    color:var(--ink);
  }
  .meal-add-row input:focus{outline:2px solid var(--rose);outline-offset:1px;}
  .meal-list{display:flex;flex-direction:column;gap:8px;margin:10px 0 16px;}
  .meal-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    background:var(--blush);
    border:1px solid var(--line);
    border-radius:12px;
    padding:10px 12px;
  }
  .meal-name{font-weight:800;font-size:13px;}
  .meal-macros{font-size:11px;color:var(--ink-soft);margin-top:2px;}
  .meal-total-pill{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:var(--blue-pale);
    color:var(--blue-deep);
    border-radius:999px;
    padding:7px 10px;
    font-size:11px;
    font-weight:850;
    margin-bottom:12px;
  }
  .macro-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;}
  .macro-field{text-align:center;}
  .macro-field label{
    display:block;font-size:10.5px;font-weight:800;
    text-transform:uppercase;letter-spacing:0.04em;margin-bottom:6px;
  }
  .macro-field.cal label{color:var(--burgundy);}
  .macro-field.pro label{color:var(--rose-deep);}
  .macro-field.fat label{color:var(--gold);}
  .macro-field.carb label{color:var(--blue-deep);}
  .macro-field input{
    width:100%;text-align:center;font-size:17px;font-weight:700;
    border:1px solid var(--line);border-radius:10px;padding:10px 4px;
    background:var(--blush);color:var(--ink);
  }
  .macro-field input:focus{outline:2px solid var(--rose);outline-offset:1px;}
  .macro-field .unit{font-size:9.5px;color:var(--ink-soft);font-weight:600;display:block;margin-top:4px;}
  .macro-progress{margin-top:14px;display:flex;flex-direction:column;gap:8px;}
  .mp-row{display:flex;align-items:center;gap:8px;font-size:11px;}
  .mp-label{width:46px;font-weight:700;color:var(--ink-soft);}
  .mp-bar{flex:1;height:6px;background:var(--blush-deep);border-radius:100px;overflow:hidden;}
  .mp-fill{height:100%;border-radius:100px;transition:width .4s ease;}
  .mp-fill.cal{background:var(--burgundy);}
  .mp-fill.pro{background:var(--rose-deep);}
  .mp-fill.fat{background:var(--gold);}
  .mp-fill.carb{background:var(--blue);}
  .mp-val{width:64px;text-align:right;color:var(--ink-soft);font-weight:600;}

  /* ===== Supplements ===== */
  .supp-stack-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:16px;
  }
  .supp-stack-chip{
    display:flex;
    align-items:center;
    gap:6px;
    background:var(--blush);
    border:1.5px solid var(--line);
    border-radius:100px;
    padding:8px 14px 8px 10px;
    cursor:pointer;
    transition:all .15s ease;
  }
  .supp-stack-chip:hover{border-color:var(--rose);}
  .supp-stack-chip.taken-today{
    background:linear-gradient(135deg,var(--rose-pale),var(--blush));
    border-color:var(--rose);
  }
  .supp-stack-chip .ssc-icon{font-size:16px;}
  .supp-stack-chip .ssc-text{font-size:12.5px;font-weight:700;color:var(--ink);}
  .supp-stack-chip .ssc-dose{font-size:10.5px;color:var(--ink-soft);font-weight:500;}
  .supp-stack-chip .ssc-check{font-size:13px;color:var(--rose-deep);margin-left:2px;}
  .supp-stack-manage{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-top:10px;
  }
  .supp-stack-edit-pill{
    display:flex;
    align-items:center;
    gap:4px;
    background:var(--blush);
    border-radius:100px;
    padding:5px 6px 5px 10px;
    font-size:11px;
    color:var(--ink-soft);
    font-weight:600;
  }
  .supp-add-row{
    display:grid;
    grid-template-columns:2fr 1fr 1fr;
    gap:8px;
    margin-bottom:10px;
  }
  .supp-add-row input, .supp-add-row select{
    width:100%;
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px;
    font-size:13px;
    background:var(--blush);
    color:var(--ink);
    font-family:inherit;
  }
  .supp-add-row input:focus, .supp-add-row select:focus{
    outline:2px solid var(--rose);outline-offset:1px;
  }
  .supp-log-list{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .supp-log-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--blush);
    border-radius:12px;
    padding:10px 12px;
    border:1px solid var(--line);
  }
  .sli-left{display:flex;align-items:center;gap:10px;}
  .sli-icon{font-size:17px;}
  .sli-name{font-weight:700;font-size:13px;}
  .sli-dose{font-size:11px;color:var(--ink-soft);}
  .sli-vs-target{font-size:10.5px;font-weight:700;margin-left:6px;}
  .sli-vs-target.under{color:var(--gold);}
  .sli-vs-target.met{color:#5C8A6E;}
  .sli-vs-target.over{color:var(--burgundy);}

  /* ===== Weight ===== */
  .weight-input-row{
    display:flex;
    gap:10px;
    align-items:flex-end;
    margin-bottom:14px;
  }
  .weight-field{flex:1;}
  .weight-field label{
    display:block;font-size:10.5px;font-weight:800;text-transform:uppercase;
    letter-spacing:0.04em;color:var(--ink-soft);margin-bottom:6px;
  }
  .weight-field input{
    width:100%;font-size:17px;font-weight:700;border:1px solid var(--line);
    border-radius:10px;padding:10px;background:var(--blush);color:var(--ink);
  }
  .weight-field input:focus{outline:2px solid var(--rose);outline-offset:1px;}
  .weight-current{
    background:linear-gradient(135deg,var(--rose-pale),var(--blush));
    border-radius:14px;
    padding:14px 16px;
    margin-bottom:14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .wc-num{font-family:Georgia,serif;font-size:26px;font-weight:700;color:var(--rose-deep);}
  .wc-lbl{font-size:11px;color:var(--ink-soft);font-weight:700;text-transform:uppercase;letter-spacing:0.04em;}
  .wc-delta{font-size:12px;font-weight:700;}
  .wc-delta.down{color:#5C8A6E;}
  .wc-delta.up{color:var(--burgundy);}
  .wc-delta.flat{color:var(--ink-soft);}

  .weight-chart-wrap{
    margin-top:6px;
  }
  svg.weight-chart{width:100%;height:140px;display:block;}

  .steps-trend-wrap{}
  .steps-trend-title{
    font-size:11px;
    font-weight:700;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:0.04em;
    margin-bottom:10px;
  }
  .steps-trend-bars{
    display:flex;
    align-items:flex-end;
    gap:4px;
    height:70px;
  }
  .st-bar-col{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-end;
    height:100%;
    gap:4px;
  }
  .st-bar{
    width:100%;
    border-radius:4px 4px 2px 2px;
    background:var(--blush-deep);
    min-height:3px;
    transition:height .3s ease;
  }
  .st-bar.hit{
    background:linear-gradient(180deg,var(--blue),var(--rose));
  }
  .st-bar-lbl{
    font-size:8.5px;
    color:var(--ink-soft);
    font-weight:600;
  }
  .steps-trend-legend{
    display:flex;
    align-items:center;
    gap:6px;
    margin-top:10px;
    font-size:11px;
    color:var(--ink-soft);
  }
  .legend-dot{
    width:8px;height:8px;border-radius:50%;
    background:linear-gradient(135deg,var(--blue),var(--rose));
    display:inline-block;
  }

  .weight-list{
    display:flex;
    flex-direction:column;
    gap:6px;
    margin-top:14px;
  }
  .weight-list-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px 0;
    border-bottom:1px solid var(--line);
    font-size:13px;
  }
  .weight-list-item:last-child{border-bottom:none;}

  /* ===== Badges ===== */
  .badge-wall{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(76px,1fr));
    gap:10px;
  }
  .badge{
    aspect-ratio:1;
    border-radius:50%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:var(--blush-deep);
    opacity:0.4;
    filter:grayscale(0.6);
    transition:all .3s ease;
    padding:6px;
    text-align:center;
    border:2px solid var(--line);
  }
  .badge.earned{
    opacity:1;
    filter:none;
    background:radial-gradient(circle at 35% 30%, #FFF8EC, var(--gold-soft));
    border-color:var(--gold);
    box-shadow:0 3px 10px rgba(201,160,78,0.35);
  }
  .badge .b-icon{font-size:21px;line-height:1;margin-bottom:3px;}
  .badge .b-name{font-size:8.5px;font-weight:800;color:var(--ink-soft);line-height:1.15;}
  .badge.earned .b-name{color:var(--rose-deep);}

  /* ===== Calendar / month strip ===== */
  .month-nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
  }
  .month-nav .m-title{font-family:Georgia,serif;font-size:16px;font-weight:700;}
  .month-nav button{
    background:var(--blush-deep);
    border:none;
    border-radius:100px;
    width:32px;height:32px;
    font-size:14px;
    cursor:pointer;
    color:var(--ink-soft);
  }
  .month-nav button:hover{background:var(--rose-pale);color:var(--rose-deep);}
  .cal-grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:5px;
  }
  .cal-dow{
    text-align:center;
    font-size:9.5px;
    font-weight:800;
    color:var(--ink-soft);
    text-transform:uppercase;
    padding-bottom:4px;
  }
  .cal-day{
    aspect-ratio:1;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:11px;
    font-weight:700;
    background:var(--blush);
    color:var(--ink-soft);
    cursor:pointer;
    position:relative;
    border:1.5px solid transparent;
  }
  .cal-day.empty{background:transparent;cursor:default;}
  .cal-day.has-activity{background:var(--rose-pale);color:var(--rose-deep);}
  .cal-day.today-cell{border-color:var(--rose-deep);}
  .cal-day.selected{background:var(--rose-deep);color:white;}
  .cal-day .dot{
    position:absolute;
    bottom:3px;
    width:4px;height:4px;
    border-radius:50%;
    background:var(--gold);
  }

  /* ===== Log list (full history) ===== */
  .log-day-group{margin-bottom:16px;}
  .log-day-header{
    font-size:12px;
    font-weight:800;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:0.04em;
    margin-bottom:8px;
    padding-bottom:6px;
    border-bottom:1px solid var(--line);
  }
  .log-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:9px 0;
    font-size:13px;
  }
  .li-left{display:flex;align-items:center;gap:10px;}
  .li-emoji{font-size:17px;}
  .li-label{font-weight:700;}
  .li-note{font-size:11px;color:var(--ink-soft);}
  .li-actions{display:flex;gap:2px;}

let state = {
  activities: [],   // [{id, date, type, note}]
  weights: [],      // [{id, date, value}]
  macroDays: {},    // { 'YYYY-MM-DD': {steps, calories, protein, fat, carbs, meals: []} }
  suppStack: [],    // [{id, name, dose, unit}] -- her personal reference list/targets
  suppLogs: [],     // [{id, date, name, dose, unit}] -- actual daily entries
  settings: {...DEFAULT_SETTINGS},
  selectedTrain: null,
  today: getTodayKey(),
  activeTab: 'today',
  calMonth: new Date().getMonth(),
  calYear: new Date().getFullYear(),
  selectedLogDate: null
};

function getTodayKey(){
  const d = new Date();
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function uid(){ return crypto.randomUUID(); }

function calcStreakFromDates(loggedDates){
  if(loggedDates.size===0) return {current:0, best:0};

  let current=0;
  let cursor = new Date();
  for(let i=0;i<730;i++){
    const key = dateKey(cursor);
    if(loggedDates.has(key)){
      current++;
      cursor.setDate(cursor.getDate()-1);
    } else if(key===state.today){
      cursor.setDate(cursor.getDate()-1);
      continue;
    } else break;
  }
  const sorted = Array.from(loggedDates).sort();
  let best=0, run=0, prevDate=null;
  sorted.forEach(d=>{
    const cur=new Date(d+'T00:00:00');
    if(prevDate){
      const diff=Math.round((cur-prevDate)/86400000);
      run = diff===1 ? run+1 : 1;
    } else run=1;
    if(run>best) best=run;
    prevDate=cur;
  });
  return {current, best:Math.max(best,current)};
}

function calcStreak(){
  // streak based on having ANY activity or macro entry logged that day
  const loggedDates = new Set([
    ...state.activities.map(a=>a.date),
    ...Object.keys(state.macroDays).filter(d=>state.macroDays[d] && (state.macroDays[d].calories || state.macroDays[d].steps))
  ]);
  return calcStreakFromDates(loggedDates);
}

function calcSuppStreak(){
  const loggedDates = new Set(state.suppLogs.map(s=>s.date));
  return calcStreakFromDates(loggedDates);
}

function dateKey(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function calcWeekScore(){
  const today = new Date();
  let score=0, max=0;
  for(let i=0;i<7;i++){
    const d=new Date(today); d.setDate(d.getDate()-i);
    const key=dateKey(d);
    max += 3;
    const acts = state.activities.filter(a=>a.date===key);
    const macro = state.macroDays[key];
    if(acts.length>0) score+=1;
    if(macro && macro.steps>=state.settings.stepsGoal) score+=1;
    if(macro && macro.calories) score+=1;
  }
  return max>0 ? Math.round((score/max)*100) : 0;
}

function getBadgeContext(){
  return {
    activities: state.activities,
    weights: state.weights,
    macroDays: Object.entries(state.macroDays).map(([date,v])=>({date,...v})),
    suppStack: state.suppStack,
    suppLogs: state.suppLogs,

function getMacroDay(dateKeyStr){
  const day = state.macroDays[dateKeyStr] || {};
  return {
    steps: Number(day.steps) || 0,
    calories: Number(day.calories) || 0,
    protein: Number(day.protein) || 0,
    fat: Number(day.fat) || 0,
    carbs: Number(day.carbs) || 0,
    meals: Array.isArray(day.meals) ? day.meals : []
  };
}

function updateStepsBar(){
  const val = parseInt(document.getElementById('input-steps').value) || 0;
  const goal = state.settings.stepsGoal;
  const pct = Math.min(100, Math.round((val/goal)*100));
  const fillEl = document.getElementById('steps-fill');
  const lblEl = document.getElementById('steps-pct-lbl');
  if(fillEl) fillEl.style.width = pct+'%';
  if(lblEl) lblEl.textContent = pct+'% of goal';
}
function addSteps(amount){
  const input = document.getElementById('input-steps');
  const cur = parseInt(input.value) || 0;
  input.value = cur + amount;
  updateStepsBar();
}
function updateMacroBars(){
  const cal = parseFloat(document.getElementById('input-cal').value) || 0;
  const pro = parseFloat(document.getElementById('input-pro').value) || 0;
  const fat = parseFloat(document.getElementById('input-fat').value) || 0;
  const carb = parseFloat(document.getElementById('input-carb').value) || 0;
  const s = state.settings;
  setBar('mp-cal', cal, s.calorieTarget);
  setBar('mp-pro', pro, s.proteinTarget);
  setBar('mp-fat', fat, s.fatTarget);
  setBar('mp-carb', carb, s.carbTarget);
}

function mealTotals(meals){
  return (meals || []).reduce((totals, meal) => {
    totals.calories += Number(meal.calories) || 0;
    totals.protein += Number(meal.protein) || 0;
    totals.fat += Number(meal.fat) || 0;
    totals.carbs += Number(meal.carbs) || 0;
    return totals;
  }, { calories:0, protein:0, fat:0, carbs:0 });
}

function syncMacroInputsFromMeals(){
  const macro = getMacroDay(state.today);
  if(!macro.meals.length) return;
  const totals = mealTotals(macro.meals);
  document.getElementById('input-cal').value = totals.calories || '';
  document.getElementById('input-pro').value = totals.protein || '';
  document.getElementById('input-fat').value = totals.fat || '';
  document.getElementById('input-carb').value = totals.carbs || '';
  updateMacroBars();
}
function setBar(id, val, target){
  const pct = target>0 ? Math.min(100, Math.round((val/target)*100)) : 0;
  const fillEl=document.getElementById(id+'-fill');
  const valEl=document.getElementById(id+'-val');
  if(fillEl) fillEl.style.width=pct+'%';
  if(valEl) valEl.textContent=`${Math.round(val)}/${Math.round(target)}`;
}

function formatDateNice(key){
  const d = new Date(key+'T00:00:00');
  return d.toLocaleDateString('en-US',{month:'short', day:'numeric'});
}
function formatDateFull(key){
  const d = new Date(key+'T00:00:00');
  return d.toLocaleDateString('en-US',{weekday:'long', month:'long', day:'numeric', year:'numeric'});
}

function drawStepsTrend(){
  const wrap = document.getElementById('steps-trend-wrap');
  if(!wrap) return;
  const days = [];
  const today = new Date();
  for(let i=13;i>=0;i--){
    const d = new Date(today);
    d.setDate(d.getDate()-i);
    const key = dateKey(d);
    const macro = state.macroDays[key];
    days.push({
      key,
      steps: macro ? (macro.steps||0) : 0,
      label: d.toLocaleDateString('en-US',{weekday:'narrow'})
    });
  }
  const goal = state.settings.stepsGoal;
  const maxVal = Math.max(goal, ...days.map(d=>d.steps), 1);
  const hitCount = days.filter(d=>d.steps>=goal).length;

  const barsHtml = days.map(d=>{
    const pct = Math.max(3, Math.round((d.steps/maxVal)*100));
    const hit = d.steps >= goal;
    return `
      <div class="st-bar-col" title="${formatDateNice(d.key)}: ${d.steps.toLocaleString()} steps">
        <div class="st-bar ${hit?'hit':''}" style="height:${pct}%;"></div>
        <span class="st-bar-lbl">${d.label}</span>
      </div>
    `;
  }).join('');

  wrap.innerHTML = `
    <div class="steps-trend-title">Last 14 days</div>
    <div class="steps-trend-bars">${barsHtml}</div>
    <div class="steps-trend-legend"><span class="legend-dot"></span> Goal hit ${hitCount}/14 days</div>
  `;
}

function escapeHtml(str){
  const div=document.createElement('div');
  div.textContent=str;
  return div.innerHTML;
}

            ${a.note ? `<div class="ai-note">${escapeHtml(a.note)}</div>` : ''}
          </div>
        </div>
        <div class="ai-actions">
          <button class="icon-btn" onclick="openEditActivity('${a.id}')" title="Edit">✏️</button>
        </div>
      </div>
    `;
  }).join('') : '';

  return `
    <div class="card">
      <h2><span class="icon">🏋️</span> Today's Activities</h2>
      <div class="card-sub">Add as many as you did today — training, yoga, walks, whatever moved.</div>
      ${activityListHtml ? `<div class="activity-list">${activityListHtml}</div>` : ''}
      <div class="train-options">
        ${ACTIVITY_TYPES.map(t=>`
          <div class="train-btn ${state.selectedTrain===t.key?'active':''}" onclick="selectTrainOption('${t.key}')">
            <span class="emoji">${t.emoji}</span>${t.label}
          </div>
        `).join('')}
      </div>
      <textarea id="input-note" class="train-note" rows="2" placeholder="Optional note — e.g. Push day, felt strong 💪"></textarea>
      <button class="btn btn-primary btn-block" onclick="addActivity()">+ Add Activity</button>
    </div>

    <div class="card">
      <h2><span class="icon">👟</span> Steps</h2>
      <div class="steps-row">
        <div class="steps-input-wrap">
          <input type="number" id="input-steps" class="steps-input" placeholder="0" value="${macro.steps||''}" oninput="updateStepsBar()">
          <div class="steps-goal-bar"><div class="steps-goal-fill" id="steps-fill" style="width:0%"></div></div>
          <div class="steps-meta">
            <span id="steps-pct-lbl">0% of goal</span>
            <span>Goal: ${s.stepsGoal.toLocaleString()}</span>
          </div>
        </div>
      </div>
      <div class="quick-steps" style="margin-top:12px;">
        <button class="chip" onclick="addSteps(1000)">+1,000</button>
        <button class="chip" onclick="addSteps(2000)">+2,000</button>
        <button class="chip" onclick="addSteps(5000)">+5,000</button>
        <button class="chip" onclick="document.getElementById('input-steps').value=0; updateStepsBar();">Reset</button>
      </div>
      <div class="steps-trend-wrap" id="steps-trend-wrap" style="margin-top:16px;"></div>
    </div>

    <div class="card">
      <h2><span class="icon">🍽️</span> Nutrition</h2>
      <div class="macro-targets">Targets: <b>${s.calorieTarget} kcal</b> · <b>${s.proteinTarget}g</b> protein · <b>${s.fatTarget}g</b> fat · <b>${s.carbTarget}g</b> carbs</div>
      <div class="card-sub">Log meals separately and the day totals update automatically.</div>
      <div class="meal-add-row">
        <input type="text" id="input-meal-name" placeholder="Meal name">
        <input type="number" id="input-meal-cal" placeholder="kcal">
        <input type="number" id="input-meal-pro" placeholder="P">
        <input type="number" id="input-meal-fat" placeholder="F">
        <input type="number" id="input-meal-carb" placeholder="C">
      </div>
      <button class="btn btn-primary btn-block" onclick="addMeal()">+ Add Meal</button>
      <div class="meal-list">${mealListHtml}</div>
      ${macro.meals.length ? `<div class="meal-total-pill">Meal total · ${Math.round(totals.calories)} kcal · ${Math.round(totals.protein)}P / ${Math.round(totals.fat)}F / ${Math.round(totals.carbs)}C</div>` : ''}
      <div class="macro-grid">
        <div class="macro-field cal"><label>Calories</label><input type="number" id="input-cal" value="${macro.calories||''}" oninput="updateMacroBars()"><span class="unit">kcal</span></div>
        <div class="macro-field pro"><label>Protein</label><input type="number" id="input-pro" value="${macro.protein||''}" oninput="updateMacroBars()"><span class="unit">grams</span></div>
        <div class="macro-field fat"><label>Fat</label><input type="number" id="input-fat" value="${macro.fat||''}" oninput="updateMacroBars()"><span class="unit">grams</span></div>
        <div class="macro-field carb"><label>Carbs</label><input type="number" id="input-carb" value="${macro.carbs||''}" oninput="updateMacroBars()"><span class="unit">grams</span></div>
      </div>
      <div class="macro-progress">
        <div class="mp-row"><span class="mp-label">Cal</span><div class="mp-bar"><div class="mp-fill cal" id="mp-cal-fill" style="width:0%"></div></div><span class="mp-val" id="mp-cal-val">0/${s.calorieTarget}</span></div>
        <div class="mp-row"><span class="mp-label">Pro</span><div class="mp-bar"><div class="mp-fill pro" id="mp-pro-fill" style="width:0%"></div></div><span class="mp-val" id="mp-pro-val">0/${s.proteinTarget}</span></div>
        <div class="mp-row"><span class="mp-label">Fat</span><div class="mp-bar"><div class="mp-fill fat" id="mp-fat-fill" style="width:0%"></div></div><span class="mp-val" id="mp-fat-val">0/${s.fatTarget}</span></div>
        <div class="mp-row"><span class="mp-label">Carb</span><div class="mp-bar"><div class="mp-fill carb" id="mp-carb-fill" style="width:0%"></div></div><span class="mp-val" id="mp-carb-val">0/${s.carbTarget}</span></div>
      </div>
      <button class="settings-toggle" onclick="toggleSettings()">Adjust my targets</button>
      <div class="settings-panel" id="settings-panel">
        <div class="settings-row"><label>Calorie target</label><input type="number" id="set-cal" value="${s.calorieTarget}"></div>
        <div class="settings-row"><label>Protein target (g)</label><input type="number" id="set-pro" value="${s.proteinTarget}"></div>
        <div class="settings-row"><label>Fat target (g)</label><input type="number" id="set-fat" value="${s.fatTarget}"></div>
        <div class="settings-row"><label>Carb target (g)</label><input type="number" id="set-carb" value="${s.carbTarget}"></div>
        <div class="settings-row"><label>Daily steps goal</label><input type="number" id="set-steps" value="${s.stepsGoal}"></div>
        <button class="btn btn-primary btn-block" onclick="saveSettingsForm()">Save targets</button>
      </div>
      <div class="section-spacer"></div>
      <button class="btn btn-primary btn-block" onclick="saveDayLog()">Save Today's Nutrition</button>
    </div>
  `;
}

function renderSupplements(){
  const todaysLogs = state.suppLogs.filter(l=>l.date===state.today);
  const takenNamesToday = new Set(todaysLogs.map(l=>l.name.toLowerCase().trim()));

  const stackChips = state.suppStack.length ? state.suppStack.map(s=>{
    const taken = takenNamesToday.has(s.name.toLowerCase().trim());
    return `
      <div class="supp-stack-chip ${taken?'taken-today':''}" onclick="${taken?'':'quickLogSupplement(\''+s.id+'\')'}" title="${taken?'Already logged today':'Tap to log'}">
        <span class="ssc-icon">${suppIconFor(s.name)}</span>
        <span>
          <div class="ssc-text">${escapeHtml(s.name)}</div>
          <div class="ssc-dose">${s.dose>0 ? s.dose+s.unit : 'no target'}</div>
        </span>
        ${taken ? '<span class="ssc-check">✓</span>' : ''}
      </div>
    `;
  }).join('') : '<div class="empty-state">No regulars saved yet — add your stack below 💊</div>';

  const stackManageHtml = state.suppStack.length ? `
    <div class="supp-stack-manage">
      ${state.suppStack.map(s=>`
        <div class="supp-stack-edit-pill">
          ${escapeHtml(s.name)}
          <button class="icon-btn" style="padding:2px 4px;" onclick="openEditStackItem('${s.id}')">✏️</button>
        </div>
      `).join('')}
    </div>
  ` : '';

  const todaysLogHtml = todaysLogs.length ? todaysLogs.map(l=>{
    const stackMatch = state.suppStack.find(s=>s.name.toLowerCase().trim()===l.name.toLowerCase().trim());
    let vsTarget = '';
    if(stackMatch && stackMatch.dose>0){
      if(l.dose < stackMatch.dose*0.9) vsTarget = `<span class="sli-vs-target under">under target</span>`;
      else if(l.dose > stackMatch.dose*1.1) vsTarget = `<span class="sli-vs-target over">over target</span>`;
      else vsTarget = `<span class="sli-vs-target met">on target</span>`;
    }
    return `
      <div class="supp-log-item">
        <div class="sli-left">
          <span class="sli-icon">${suppIconFor(l.name)}</span>
          <div>
            <div class="sli-name">${escapeHtml(l.name)}</div>
            <div class="sli-dose">${l.dose>0 ? l.dose+l.unit : 'logged'} ${vsTarget}</div>
          </div>
        </div>
        <button class="icon-btn" onclick="openEditSuppLog('${l.id}')">✏️</button>
      </div>
    `;
  }).join('') : '<div class="empty-state">Nothing logged yet today</div>';

  const unitOptionsHtml = SUPP_UNITS.map(u=>`<option value="${u}">${u}</option>`).join('');

  return `
    <div class="card">
      <h2><span class="icon">💊</span> Your Stack</h2>
      <div class="card-sub">Tap a regular to log it at its target dose for today.</div>
      <div class="supp-stack-row">${stackChips}</div>

      <button class="settings-toggle" onclick="toggleStackManage()">Manage my stack</button>
      <div class="settings-panel" id="stack-manage-panel">
        ${stackManageHtml}
        <div class="supp-add-row" style="margin-top:12px;">
          <input type="text" id="input-stack-name" placeholder="e.g. Creatine">
          <input type="number" step="0.1" id="input-stack-dose" placeholder="Dose">
          <select id="input-stack-unit">${unitOptionsHtml}</select>
        </div>
        <button class="btn btn-primary btn-block" onclick="addStackItem()">+ Add to Stack</button>
      </div>
    </div>

    <div class="card">
      <h2><span class="icon">🧪</span> Log Something Else</h2>
      <div class="card-sub">One-off or new supplement? Add it here.</div>
      <div class="supp-add-row">
        <input type="text" id="input-supp-name" placeholder="Supplement name">
        <input type="number" step="0.1" id="input-supp-dose" placeholder="Dose">
        <select id="input-supp-unit">${unitOptionsHtml}</select>
      </div>
      <button class="btn btn-primary btn-block" onclick="addFreeformSupplement()">+ Log It</button>
    </div>

    <div class="card">
      <h2><span class="icon">📋</span> Today's Supplements</h2>
      <div class="supp-log-list">${todaysLogHtml}</div>
    </div>
  `;
}

function renderWeight(){
  const sorted = [...state.weights].sort((a,b)=>a.date.localeCompare(b.date));
  const latest = sorted[sorted.length-1];
  const prev = sorted[sorted.length-2];
  let deltaHtml = '';
  if(latest && prev){
    const diff = latest.value - prev.value;
    const cls = diff<-0.05?'down':diff>0.05?'up':'flat';
    const arrow = diff<-0.05?'↓':diff>0.05?'↑':'→';
    deltaHtml = `<div class="wc-delta ${cls}">${arrow} ${Math.abs(diff).toFixed(1)}kg</div>`;
  }

  const recentList = [...sorted].reverse().slice(0,10).map(w=>`
    <div class="weight-list-item">
      <span>${formatDateNice(w.date)}</span>
      <span style="display:flex;align-items:center;gap:10px;">
        <b>${w.value.toFixed(1)} kg</b>
        <button class="icon-btn" onclick="openEditWeight('${w.id}')">✏️</button>
      </span>
    </div>
  `).join('');

  return `
    <div class="card">
      <h2><span class="icon">⚖️</span> Weigh-In</h2>
      <div class="card-sub">Log whenever you weigh yourself — no fixed schedule needed.</div>
      ${latest ? `
        <div class="weight-current">
          <div>
            <div class="wc-lbl">Latest</div>
            <div class="wc-num">${latest.value.toFixed(1)} kg</div>
          </div>
          ${deltaHtml}
        </div>
      ` : ''}
      <div class="weight-input-row">
        <div class="weight-field">
          <label>Weight (kg)</label>
          <input type="number" step="0.1" id="input-weight" placeholder="e.g. 51.4">
        </div>
        <div class="weight-field">
          <label>Date</label>
          <input type="date" id="input-weight-date" value="${state.today}">
        </div>
      </div>
      <button class="btn btn-primary btn-block" onclick="addWeight()">+ Log Weight</button>
    </div>

    <div class="card">
      <h2><span class="icon">📈</span> Trend</h2>
      ${sorted.length>=2 ? `<div class="weight-chart-wrap" id="weight-chart-wrap"></div>` : `<div class="empty-state">Log at least 2 weigh-ins to see your trend ✨</div>`}
    </div>

    <div class="card">
      <h2><span class="icon">📜</span> Weigh-In History</h2>
      ${recentList ? `<div class="weight-list">${recentList}</div>` : '<div class="empty-state">No weigh-ins logged yet</div>'}
    </div>
  `;
}

function drawWeightChart(){
  const wrap = document.getElementById('weight-chart-wrap');
  if(!wrap) return;
  const sorted = [...state.weights].sort((a,b)=>a.date.localeCompare(b.date));
  if(sorted.length<2) return;

  const w=680, h=140, pad=24;
  const values = sorted.map(d=>d.value);
  const minV = Math.min(...values), maxV = Math.max(...values);
  const range = maxV-minV || 1;
  const padded_min = minV - range*0.15;
  const padded_max = maxV + range*0.15;
  const padded_range = padded_max - padded_min || 1;

  const points = sorted.map((d,i)=>{
    const x = pad + (i/(sorted.length-1)) * (w-pad*2);
    const y = h - pad - ((d.value-padded_min)/padded_range)*(h-pad*2);
    return {x,y,date:d.date,value:d.value};
  });

  const pathD = points.map((p,i)=> (i===0?'M':'L')+p.x.toFixed(1)+','+p.y.toFixed(1)).join(' ');
  const areaD = pathD + ` L${points[points.length-1].x.toFixed(1)},${h-pad} L${points[0].x.toFixed(1)},${h-pad} Z`;

  const dots = points.map(p=>`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3.5" fill="#B06A4F" stroke="white" stroke-width="1.5"/>`).join('');

  const svg = `
    <svg class="weight-chart" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="wgrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#C98A6B" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="#C98A6B" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="${areaD}" fill="url(#wgrad)"/>
      <path d="${pathD}" fill="none" stroke="#B06A4F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      ${dots}
    </svg>
  `;
  wrap.innerHTML = svg;
}

function renderLog(){
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const firstOfMonth = new Date(state.calYear, state.calMonth, 1);
  const startDow = firstOfMonth.getDay();
  const daysInMonth = new Date(state.calYear, state.calMonth+1, 0).getDate();

  const activityDates = new Set(state.activities.map(a=>a.date));
  const macroDates = new Set(Object.keys(state.macroDays).filter(d=>state.macroDays[d].calories || state.macroDays[d].steps));
  const suppDates = new Set(state.suppLogs.map(s=>s.date));

  let cells = '';
  for(let i=0;i<startDow;i++) cells += `<div class="cal-day empty"></div>`;
  for(let day=1; day<=daysInMonth; day++){
    const key = `${state.calYear}-${String(state.calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday = key===state.today;
    const hasAct = activityDates.has(key) || macroDates.has(key) || suppDates.has(key);
    const isSelected = state.selectedLogDate===key;
    cells += `
      <div class="cal-day ${hasAct?'has-activity':''} ${isToday?'today-cell':''} ${isSelected?'selected':''}" onclick="selectLogDate('${key}')">
        ${day}
        ${hasAct && !isSelected ? '<span class="dot"></span>' : ''}
      </div>
    `;
  }

  let dayDetailHtml = '';
  if(state.selectedLogDate){
    const key = state.selectedLogDate;
    const acts = state.activities.filter(a=>a.date===key);
    const macro = state.macroDays[key];
    const supps = state.suppLogs.filter(s=>s.date===key);
    const actHtml = acts.map(a=>{
      const t = ACTIVITY_TYPES.find(x=>x.key===a.type);
      return `
        <div class="log-item">
          <div class="li-left">
            <span class="li-emoji">${t?t.emoji:'✨'}</span>
            <div>
              <div class="li-label">${t?t.label:'Activity'}</div>
              ${a.note ? `<div class="li-note">${escapeHtml(a.note)}</div>` : ''}
            </div>
          </div>
          <div class="li-actions">
            <button class="icon-btn" onclick="openEditActivity('${a.id}')">✏️</button>
          </div>
        </div>
      `;
    }).join('');
    const macroHtml = macro && (macro.calories || macro.steps) ? `
      <div class="log-item">
        <div class="li-left">
          <span class="li-emoji">🍽️</span>
          <div>
            <div class="li-label">${macro.calories ? Math.round(macro.calories)+' kcal · '+Math.round(macro.protein||0)+'g P / '+Math.round(macro.fat||0)+'g F / '+Math.round(macro.carbs||0)+'g C' : 'Nutrition logged'}</div>
            ${macro.steps ? `<div class="li-note">${macro.steps.toLocaleString()} steps</div>` : ''}
          </div>
        </div>
      </div>
    ` : '';
    const suppHtml = supps.map(s=>`
      <div class="log-item">
        <div class="li-left">
          <span class="li-emoji">${suppIconFor(s.name)}</span>
          <div>
            <div class="li-label">${escapeHtml(s.name)}</div>
            ${s.dose>0 ? `<div class="li-note">${s.dose}${s.unit}</div>` : ''}
          </div>
        </div>
        <div class="li-actions">
          <button class="icon-btn" onclick="openEditSuppLog('${s.id}')">✏️</button>
        </div>
      </div>
    `).join('');

    dayDetailHtml = `
      <div class="card">
        <h2><span class="icon">📋</span> ${formatDateFull(key)}</h2>
        ${(actHtml || macroHtml || suppHtml) ? actHtml + macroHtml + suppHtml : '<div class="empty-state">Nothing logged this day</div>'}
      </div>
    `;
  }

  // Recent entries list (chronological, most recent first) — long-term scroll, not just this month
  const allDates = Array.from(new Set([...state.activities.map(a=>a.date), ...Object.keys(state.macroDays), ...state.suppLogs.map(s=>s.date)]))
    .filter(d=> state.activities.some(a=>a.date===d) || (state.macroDays[d] && (state.macroDays[d].calories || state.macroDays[d].steps)) || state.suppLogs.some(s=>s.date===d))
    .sort().reverse()
    .slice(0,30);

  const recentGroupsHtml = allDates.map(date=>{
    const acts = state.activities.filter(a=>a.date===date);
    const macro = state.macroDays[date];
    const supps = state.suppLogs.filter(s=>s.date===date);
    const items = acts.map(a=>{
      const t = ACTIVITY_TYPES.find(x=>x.key===a.type);
      return `
        <div class="log-item">
          <div class="li-left">
            <span class="li-emoji">${t?t.emoji:'✨'}</span>
            <div><div class="li-label">${t?t.label:'Activity'}</div>${a.note?`<div class="li-note">${escapeHtml(a.note)}</div>`:''}</div>
          </div>
          <div class="li-actions"><button class="icon-btn" onclick="openEditActivity('${a.id}')">✏️</button></div>
        </div>
      `;
    }).join('');
    const macroItem = macro && macro.calories ? `
      <div class="log-item">
        <div class="li-left">
          <span class="li-emoji">🍽️</span>
          <div><div class="li-label">${Math.round(macro.calories)} kcal · ${Math.round(macro.protein||0)}P/${Math.round(macro.fat||0)}F/${Math.round(macro.carbs||0)}C</div>${macro.steps?`<div class="li-note">${macro.steps.toLocaleString()} steps</div>`:''}</div>
        </div>
      </div>
    ` : '';
    const suppItems = supps.map(s=>`
      <div class="log-item">
        <div class="li-left">
          <span class="li-emoji">${suppIconFor(s.name)}</span>
          <div><div class="li-label">${escapeHtml(s.name)}</div>${s.dose>0?`<div class="li-note">${s.dose}${s.unit}</div>`:''}</div>
        </div>
        <div class="li-actions"><button class="icon-btn" onclick="openEditSuppLog('${s.id}')">✏️</button></div>
      </div>
    `).join('');
    return `
      <div class="log-day-group">
        <div class="log-day-header">${formatDateFull(date)}</div>
        ${items}${macroItem}${suppItems}
      </div>
    `;
  }).join('');

  return `
    <div class="card">
      <div class="month-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <div class="m-title">${monthNames[state.calMonth]} ${state.calYear}</div>
        <button onclick="changeMonth(1)">›</button>
      </div>
      <div class="cal-grid">
        ${['S','M','T','W','T','F','S'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}
        ${cells}
      </div>
    </div>
    ${dayDetailHtml}
    <div class="card">
      <h2><span class="icon">📖</span> Recent History</h2>
      ${recentGroupsHtml || '<div class="empty-state">No entries yet — start logging today 🌱</div>'}
    </div>
  `;
}

function renderBadges(){
  const earnedIds = getEarnedBadgeIds();
  return `
    <div class="card">
      <h2><span class="icon">🏅</span> Badge Collection</h2>
      <div class="card-sub">${earnedIds.length} of ${BADGES.length} earned — keep going, Lulu 👑</div>
      <div class="badge-wall">
        ${BADGES.map(b=>`
          <div class="badge ${earnedIds.includes(b.id)?'earned':''}">
            <span class="b-icon">${b.icon}</span>
            <span class="b-name">${b.name}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}
